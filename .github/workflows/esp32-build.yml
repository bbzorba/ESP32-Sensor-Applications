name: ESP32 CI Build & Flash

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]


env:
  #Port for Work PC
  SERIAL_PORT: COM3

  #Port for Home PC (example - runner may already have these set)
  #SERIAL_PORT: COM7

  # Port for MacOS
  #SERIAL_PORT: /dev/cu.usbserial-0001

jobs:
  build-local:
    runs-on: [self-hosted, windows]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Disable ccache
        run: |
          $env:CCACHE_DISABLE="1"
          [System.Environment]::SetEnvironmentVariable("CCACHE_DISABLE", "1", "Process")

      - name: Build (via Makefile)
        env:
          CCACHE_DISABLE: "1"
        run: |
          echo Building project using Makefile (incremental; do NOT run make clean)
          make build PROJECT_DIR=%GITHUB_WORKSPACE%
        shell: cmd

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32_build
          path: |
            build/**
          if-no-files-found: error

  flash-local:
    runs-on: [self-hosted, windows]
    needs: build-local
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp32_build
          path: build_artifacts

      - name: Prepare build directory (copy artifact into workspace)
        run: |
          if exist build rmdir /s /q build
          mkdir build
          xcopy build_artifacts\build\* build\ /E /I /Y > NUL
        shell: cmd

      - name: Disable ccache
        run: |
          $env:CCACHE_DISABLE="1"
          [System.Environment]::SetEnvironmentVariable("CCACHE_DISABLE", "1", "Process")

      - name: Flash Project (via Makefile)
        env:
          CCACHE_DISABLE: "1"
        run: |
          echo Flashing project using Makefile (Makefile will use PROJECT_DIR)
          make flash PROJECT_DIR=%GITHUB_WORKSPACE% PORT=%SERIAL_PORT%
        shell: cmd

  verify-local:
    runs-on: [self-hosted, windows]
    needs: flash-local
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: esp32_build
          path: build_artifacts

      - name: Prepare build directory (copy artifact into workspace)
        run: |
          if exist build rmdir /s /q build
          mkdir build
          xcopy build_artifacts\build\* build\ /E /I /Y > NUL
        shell: cmd

      - name: Disable ccache
        run: |
          $env:CCACHE_DISABLE="1"
          [System.Environment]::SetEnvironmentVariable("CCACHE_DISABLE", "1", "Process")

      - name: Verify Firmware on ESP32 (via Makefile monitor)
        env:
          CCACHE_DISABLE: "1"
        run: |
          echo Starting monitor via Makefile for 10 seconds
          start "" /b make monitor PROJECT_DIR=%GITHUB_WORKSPACE% PORT=%SERIAL_PORT% > monitor_output.txt 2> monitor_error.txt
          timeout /t 10
          echo Stopping monitor...
          for /f "tokens=2" %%a in ('tasklist ^| findstr /i "idf.py"') do taskkill /pid %%a /f
          echo Monitor output:
          type monitor_output.txt
          echo Monitor error output:
          type monitor_error.txt
        shell: cmd